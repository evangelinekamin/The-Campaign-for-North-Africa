[pytest]
# Parallel test execution across all cores (pytest-xdist). The 440-test suite runs
# many full-campaign simulations (each folding thousands of events; the rule-48 turn
# clock tripled every game's op-stages), so -n auto cuts wall-clock ~3.6x: ~100s vs
# ~360s single-threaded. Requires pytest-xdist (see requirements-dev.txt).
addopts = -n auto
